name: Build & Package

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ZyntaSchoolBell.sln

      - name: Build (Release)
        run: msbuild ZyntaSchoolBell.sln /p:Configuration=Release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile Installer
        run: iscc installer/ZyntaSchoolBell.iss
        shell: cmd

      - name: Upload setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZyntaSchoolBell-Setup
          path: installer/Output/ZyntaSchoolBell-Setup.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ZyntaSchoolBell.sln

      - name: Build (Release)
        run: msbuild ZyntaSchoolBell.sln /p:Configuration=Release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile Installer
        run: iscc installer/ZyntaSchoolBell.iss
        shell: cmd

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/ZyntaSchoolBell-Setup.exe
          generate_release_notes: true
