name: CI Gate

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Stage 1: Build & Compile
  # ============================================================
  build:
    name: Build & Compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ZyntaSchoolBell.sln -PackagesDirectory packages

      - name: Verify NuGet packages
        run: |
          Write-Host "CWD: $(Get-Location)"
          Write-Host ""
          Write-Host "=== Package DLLs ==="
          Get-ChildItem -Path packages -Recurse -Filter "*.dll" | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }
          Write-Host ""
          Write-Host "=== HintPath resolution test ==="
          $projDir = "src\ZyntaSchoolBell"
          $hintPaths = @(
            "..\..\packages\NAudio.2.2.1\lib\net472\NAudio.dll",
            "..\..\packages\NAudio.WinMM.2.2.1\lib\net472\NAudio.WinMM.dll",
            "..\..\packages\NAudio.Wasapi.2.2.1\lib\netstandard2.0\NAudio.Wasapi.dll",
            "..\..\packages\NAudio.Core.2.2.1\lib\netstandard2.0\NAudio.Core.dll"
          )
          foreach ($hint in $hintPaths) {
            $full = Join-Path $projDir $hint
            $resolved = [System.IO.Path]::GetFullPath($full)
            $exists = Test-Path $resolved
            Write-Host "  $hint -> $resolved [exists=$exists]"
          }
        shell: pwsh

      - name: Build (Release)
        run: msbuild ZyntaSchoolBell.sln /p:Configuration=Release /v:detailed 2>&1 | Select-String -Pattern "NAudio|ResolveAssembly|Primary reference|HintPath" | Select-Object -First 40
        shell: pwsh

      - name: Build (Debug)
        run: msbuild ZyntaSchoolBell.sln /p:Configuration=Debug

      - name: Verify output binaries exist
        run: |
          if (!(Test-Path "src\ZyntaSchoolBell\bin\Release\ZyntaSchoolBell.exe")) {
            Write-Error "Release binary not found"
            exit 1
          }
          $size = (Get-Item "src\ZyntaSchoolBell\bin\Release\ZyntaSchoolBell.exe").Length
          Write-Host "Binary size: $($size / 1KB) KB"
          if ($size -lt 1KB) {
            Write-Error "Binary suspiciously small"
            exit 1
          }
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: src/ZyntaSchoolBell/bin/Release/
          retention-days: 5

  # ============================================================
  # Stage 2: Security Analysis
  # ============================================================
  security:
    name: Security Analysis
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          $patterns = @(
            'password\s*=\s*"[^"]+',
            'api[_-]?key\s*=\s*"[^"]+',
            'secret\s*=\s*"[^"]+',
            'connectionstring\s*=\s*"[^"]+',
            'private[_-]?key',
            'BEGIN\s+(RSA|DSA|EC|OPENSSH)\s+PRIVATE\s+KEY'
          )
          $found = $false
          foreach ($pattern in $patterns) {
            $matches = Get-ChildItem -Recurse -Include *.cs,*.json,*.config,*.xml -File |
              Select-String -Pattern $pattern -CaseSensitive:$false
            if ($matches) {
              Write-Warning "Potential secret found matching pattern: $pattern"
              $matches | ForEach-Object { Write-Warning "  $($_.Filename):$($_.LineNumber)" }
              $found = $true
            }
          }
          if ($found) {
            Write-Error "Hardcoded secrets detected! Review the above findings."
            exit 1
          }
          Write-Host "No hardcoded secrets found."
        shell: pwsh

      - name: Check for dangerous code patterns
        run: |
          $dangerousPatterns = @{
            'Process.Start with user input' = 'Process\.Start\s*\(\s*[^"'']'
            'SQL injection risk' = 'string\.Format.*SELECT|"SELECT.*\+\s*\w'
            'Deserialization without type check' = 'TypeNameHandling\.(All|Auto|Objects|Arrays)'
            'Weak cryptography' = '(MD5|SHA1)\.Create'
            'Registry HKLM write' = 'Registry\.(LocalMachine|HKEY_LOCAL_MACHINE)'
            'Unrestricted file access' = 'File\.(ReadAllText|WriteAllText)\s*\([^)]*\+[^)]*\)'
          }
          $issues = @()
          foreach ($entry in $dangerousPatterns.GetEnumerator()) {
            $matches = Get-ChildItem -Path src -Recurse -Include *.cs -File |
              Select-String -Pattern $entry.Value -CaseSensitive:$false
            if ($matches) {
              $issues += "$($entry.Key): $($matches.Count) occurrence(s)"
              $matches | ForEach-Object { Write-Warning "  $($_.Filename):$($_.LineNumber): $($_.Line.Trim())" }
            }
          }
          if ($issues.Count -gt 0) {
            Write-Warning "Security review needed:"
            $issues | ForEach-Object { Write-Warning "  - $_" }
            # Warn but don't fail — these need manual review
            Write-Host "::warning::Security patterns detected. Review recommended."
          } else {
            Write-Host "No dangerous code patterns detected."
          }
        shell: pwsh

      - name: Verify no sensitive files in repo
        run: |
          $sensitiveFiles = @('*.pfx', '*.p12', '*.key', '*.pem', '.env', '*.credentials', 'secrets.*')
          $found = @()
          foreach ($pattern in $sensitiveFiles) {
            $files = Get-ChildItem -Recurse -Filter $pattern -File -ErrorAction SilentlyContinue
            if ($files) {
              $found += $files.FullName
            }
          }
          if ($found.Count -gt 0) {
            Write-Error "Sensitive files found in repository:"
            $found | ForEach-Object { Write-Error "  $_" }
            exit 1
          }
          Write-Host "No sensitive files found."
        shell: pwsh

      - name: Check NuGet package vulnerabilities
        run: |
          # Parse packages.config for known vulnerable versions
          [xml]$packages = Get-Content "src/ZyntaSchoolBell/packages.config"
          $deps = $packages.packages.package | ForEach-Object { "$($_.id) $($_.version)" }
          Write-Host "Dependencies:"
          $deps | ForEach-Object { Write-Host "  $_" }

          # Check for known vulnerable versions (basic check)
          $vulnerable = @()
          foreach ($pkg in $packages.packages.package) {
            # Newtonsoft.Json < 13.0.1 has known vulnerabilities
            if ($pkg.id -eq "Newtonsoft.Json" -and [version]$pkg.version -lt [version]"13.0.1") {
              $vulnerable += "$($pkg.id) $($pkg.version) — update to >= 13.0.1"
            }
          }
          if ($vulnerable.Count -gt 0) {
            Write-Warning "Vulnerable packages:"
            $vulnerable | ForEach-Object { Write-Warning "  $_" }
            Write-Host "::warning::Vulnerable NuGet packages detected."
          } else {
            Write-Host "No known vulnerable packages."
          }
        shell: pwsh

  # ============================================================
  # Stage 3: Performance & Reliability Checks
  # ============================================================
  performance:
    name: Performance & Reliability
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Check for performance anti-patterns
        run: |
          $antiPatterns = @{
            'File I/O in tight loop' = 'for\s*\(.*\)\s*\{[^}]*File\.(Read|Write|Append)'
            'Thread.Sleep in UI code' = 'Thread\.Sleep.*//.*UI|Thread\.Sleep.*Form'
            'Unbounded collection growth' = 'new\s+List<.*>\(\)(?!.*\.Clear)'
            'Missing Dispose' = 'new\s+(StreamWriter|StreamReader|FileStream|SqlConnection)\b(?!.*using)'
            'Lock contention risk' = 'lock\s*\(\s*this\s*\)'
            'Event raised inside lock' = 'lock\s*\([^)]+\)\s*\{[^}]*\?\s*\.Invoke'
          }
          $warnings = @()
          foreach ($entry in $antiPatterns.GetEnumerator()) {
            $matches = Get-ChildItem -Path src -Recurse -Include *.cs -File |
              Select-String -Pattern $entry.Value -CaseSensitive:$false
            if ($matches) {
              $warnings += "$($entry.Key): $($matches.Count) hit(s)"
              $matches | ForEach-Object {
                Write-Host "::warning file=$($_.Path),line=$($_.LineNumber)::$($entry.Key)"
              }
            }
          }
          if ($warnings.Count -gt 0) {
            Write-Host "Performance warnings found:"
            $warnings | ForEach-Object { Write-Host "  - $_" }
          } else {
            Write-Host "No performance anti-patterns detected."
          }
        shell: pwsh

      - name: Verify alarm timing reliability patterns
        run: |
          $alarmFile = "src/ZyntaSchoolBell/Services/AlarmEngine.cs"
          $content = Get-Content $alarmFile -Raw

          $checks = @{
            'Uses <= for alarm matching (not ==)' = 'string\.Compare\(alarm\.Time.*<=\s*0'
            'Events raised outside lock' = '//.*Raise events OUTSIDE|//.*outside.*lock'
            'Fired set prevents double-fire' = '_firedTodaySet\.Contains'
            'Midnight reset present' = 'now\.Date\s*!=\s*_lastDate'
            'IsMuted is volatile' = 'volatile.*_isMuted|volatile bool _isMuted'
            'Deep copy of alarm list' = 'new AlarmEntry|\.Select\(a => new'
          }

          $passed = 0
          $failed = 0
          foreach ($entry in $checks.GetEnumerator()) {
            if ($content -match $entry.Value) {
              Write-Host "[PASS] $($entry.Key)"
              $passed++
            } else {
              Write-Error "[FAIL] $($entry.Key)"
              $failed++
            }
          }

          Write-Host "`nTiming reliability: $passed passed, $failed failed"
          if ($failed -gt 0) {
            Write-Error "Alarm timing reliability checks failed!"
            exit 1
          }
        shell: pwsh

      - name: Verify wake-from-sleep support
        run: |
          $wakeFile = "src/ZyntaSchoolBell/Services/WakeScheduler.cs"
          if (!(Test-Path $wakeFile)) {
            Write-Error "WakeScheduler.cs not found — wake-from-sleep not implemented"
            exit 1
          }
          $content = Get-Content $wakeFile -Raw

          $checks = @{
            'CreateWaitableTimer P/Invoke' = 'CreateWaitableTimer'
            'SetWaitableTimer with fResume=true' = 'fResume.*true|true\);\s*//.*[Ww]ake'
            'Graceful degradation' = 'catch|_supported|failed'
          }

          foreach ($entry in $checks.GetEnumerator()) {
            if ($content -match $entry.Value) {
              Write-Host "[PASS] $($entry.Key)"
            } else {
              Write-Error "[FAIL] $($entry.Key)"
              exit 1
            }
          }
          Write-Host "Wake-from-sleep implementation verified."
        shell: pwsh

      - name: Verify system volume enforcement
        run: |
          $volFile = "src/ZyntaSchoolBell/Services/SystemVolumeManager.cs"
          if (!(Test-Path $volFile)) {
            Write-Error "SystemVolumeManager.cs not found"
            exit 1
          }
          $content = Get-Content $volFile -Raw

          if ($content -match 'MMDeviceEnumerator' -and $content -match 'MasterVolumeLevelScalar' -and $content -match '\.Mute') {
            Write-Host "[PASS] System volume manager uses Core Audio API with mute check"
          } else {
            Write-Error "[FAIL] System volume manager missing required functionality"
            exit 1
          }
        shell: pwsh

  # ============================================================
  # Stage 4: Installer Build
  # ============================================================
  installer:
    name: Build Installer
    runs-on: windows-latest
    needs: [build, security, performance]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore & Build
        run: |
          nuget restore ZyntaSchoolBell.sln -PackagesDirectory packages
          msbuild ZyntaSchoolBell.sln /p:Configuration=Release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile Installer
        run: iscc installer/ZyntaSchoolBell.iss
        shell: cmd

      - name: Verify installer
        run: |
          $installer = "installer/Output/ZyntaSchoolBell-Setup.exe"
          if (!(Test-Path $installer)) {
            Write-Error "Installer not found at $installer"
            exit 1
          }
          $size = (Get-Item $installer).Length
          Write-Host "Installer size: $([math]::Round($size / 1MB, 2)) MB"
          if ($size -lt 100KB) {
            Write-Error "Installer suspiciously small ($size bytes)"
            exit 1
          }
          Write-Host "Installer build verified."
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZyntaSchoolBell-Setup
          path: installer/Output/ZyntaSchoolBell-Setup.exe
          retention-days: 30
