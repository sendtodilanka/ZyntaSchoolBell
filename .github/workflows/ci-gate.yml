name: CI Gate

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  # ============================================================
  # Stage 1: Build, Security & Performance (parallel)
  # ============================================================
  build:
    name: Build & Compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild ZyntaSchoolBell.sln /t:Restore

      - name: Build (Release)
        run: msbuild ZyntaSchoolBell.sln /p:Configuration=Release

      - name: Verify output binary
        run: |
          if (!(Test-Path "src\ZyntaSchoolBell\bin\Release\ZyntaSchoolBell.exe")) {
            Write-Error "Release binary not found"
            exit 1
          }
          $size = (Get-Item "src\ZyntaSchoolBell\bin\Release\ZyntaSchoolBell.exe").Length
          Write-Host "Binary size: $($size / 1KB) KB"
          if ($size -lt 1KB) {
            Write-Error "Binary suspiciously small"
            exit 1
          }
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: src/ZyntaSchoolBell/bin/Release/
          retention-days: 5

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          FOUND=0
          for pattern in \
            'password\s*=\s*"[^"]+' \
            'api[_-]?key\s*=\s*"[^"]+' \
            'secret\s*=\s*"[^"]+' \
            'connectionstring\s*=\s*"[^"]+' \
            'private[_-]?key' \
            'BEGIN\s+(RSA|DSA|EC|OPENSSH)\s+PRIVATE\s+KEY'; do
            if grep -rniE "$pattern" --include="*.cs" --include="*.json" --include="*.config" --include="*.xml" . 2>/dev/null; then
              echo "::warning::Potential secret found matching: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Hardcoded secrets detected!"
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Verify no sensitive files in repo
        run: |
          FOUND=0
          for ext in pfx p12 key pem credentials; do
            if find . -name "*.$ext" -type f | grep -q .; then
              echo "::error::Sensitive file found: *.$ext"
              FOUND=1
            fi
          done
          if [ -f .env ]; then
            echo "::error::Sensitive file found: .env"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "No sensitive files found."

  performance:
    name: Performance & Reliability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify alarm timing reliability
        run: |
          FILE="src/ZyntaSchoolBell/Services/AlarmEngine.cs"
          FAILED=0
          check() {
            if grep -qP "$2" "$FILE"; then
              echo "[PASS] $1"
            else
              echo "[FAIL] $1"
              FAILED=1
            fi
          }
          check "Uses <= for alarm matching" 'string\.Compare\(alarm\.Time.*<=\s*0'
          check "Events raised outside lock" '(Raise events OUTSIDE|outside.*lock)'
          check "Fired set prevents double-fire" '_firedTodaySet\.Contains'
          check "Midnight reset present" 'now\.Date\s*!=\s*_lastDate'
          check "IsMuted is volatile" 'volatile.*_isMuted'
          check "Deep copy of alarm list" '(new AlarmEntry|\.Select\(a => new)'
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Verify wake-from-sleep support
        run: |
          FILE="src/ZyntaSchoolBell/Services/WakeScheduler.cs"
          if [ ! -f "$FILE" ]; then
            echo "::error::WakeScheduler.cs not found"
            exit 1
          fi
          grep -q "CreateWaitableTimer" "$FILE" && echo "[PASS] CreateWaitableTimer"
          grep -qP 'true\);\s*//.*[Ww]ake|fResume.*true' "$FILE" && echo "[PASS] fResume=true"
          grep -qP 'catch|_supported|failed' "$FILE" && echo "[PASS] Graceful degradation"

      - name: Verify system volume enforcement
        run: |
          FILE="src/ZyntaSchoolBell/Services/SystemVolumeManager.cs"
          if [ ! -f "$FILE" ]; then
            echo "::error::SystemVolumeManager.cs not found"
            exit 1
          fi
          grep -q "MMDeviceEnumerator" "$FILE" \
            && grep -q "MasterVolumeLevelScalar" "$FILE" \
            && grep -q "\.Mute" "$FILE" \
            && echo "[PASS] Core Audio API with mute check" \
            || { echo "[FAIL] Missing required functionality"; exit 1; }

  # ============================================================
  # Stage 2: Installer Build (depends on build only)
  # ============================================================
  installer:
    name: Build Installer
    runs-on: windows-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: src/ZyntaSchoolBell/bin/Release/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate audio files
        run: |
          pip install edge-tts
          python tools/generate_audio.py

      - name: Verify audio files
        run: |
          $audioDir = "audio"
          $expected = @(
            "opening_bell", "period_1", "period_2", "period_3", "period_4",
            "period_5", "period_6", "period_7", "period_8", "interval",
            "lunch_break", "afternoon_bell", "closing_bell", "warning_bell", "assembly"
          )
          $missing = @()
          foreach ($key in $expected) {
            foreach ($lang in @("si", "en", "ta")) {
              $file = "$audioDir\$key\$lang.mp3"
              if (!(Test-Path $file)) {
                $missing += $file
              } elseif ((Get-Item $file).Length -lt 1KB) {
                $missing += "$file (too small)"
              }
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing or invalid audio files:"
            $missing | ForEach-Object { Write-Error "  $_" }
            exit 1
          }
          $total = (Get-ChildItem -Path $audioDir -Recurse -Filter *.mp3).Count
          Write-Host "Audio verification passed: $total MP3 files generated."
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile Installer
        run: iscc installer/ZyntaSchoolBell.iss
        shell: cmd

      - name: Verify installer
        run: |
          $installer = "installer/Output/ZyntaSchoolBell-Setup.exe"
          if (!(Test-Path $installer)) {
            Write-Error "Installer not found at $installer"
            exit 1
          }
          $size = (Get-Item $installer).Length
          Write-Host "Installer size: $([math]::Round($size / 1MB, 2)) MB"
          if ($size -lt 100KB) {
            Write-Error "Installer suspiciously small ($size bytes)"
            exit 1
          }
          Write-Host "Installer build verified."
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZyntaSchoolBell-Setup
          path: installer/Output/ZyntaSchoolBell-Setup.exe
          retention-days: 30
