name: Auto PR & Merge

# Runs after CI Gate passes on feature branches
on:
  workflow_run:
    workflows: ["CI Gate"]
    types: [completed]
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

# Branch එකකට එකම merge run එකක් — different branches parallel වෙනවා (#8)
concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  auto-pr-merge:
    name: Auto Create PR → Merge → Cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run if CI Gate succeeded and it was a push event (not PR)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Validate branch name
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if ! echo "$BRANCH" | grep -qE '^[a-zA-Z0-9._/\-]+$'; then
            echo "::error::Invalid branch name: '$BRANCH'. Only alphanumerics, dots, slashes, underscores and hyphens are allowed."
            exit 1
          fi
          echo "Branch name validated: $BRANCH"

      - name: Get branch info
        id: branch
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

          # Get commit info for PR description
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_BODY=$(git log -1 --pretty=format:"%b")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          # Strip newlines/carriage returns to prevent GITHUB_OUTPUT injection (#3)
          AUTHOR=$(git log -1 --pretty=format:"%an" | tr -d '\n\r')

          echo "commit_msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"

          # Random delimiter prevents commit body from closing it early (#2)
          DELIM="BODY_EOF_$(openssl rand -hex 8)"
          {
            echo "commit_body<<$DELIM"
            echo "$COMMIT_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          # Count commits ahead of main
          AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo "?")
          echo "commits_ahead=$AHEAD" >> "$GITHUB_OUTPUT"

      - name: Check if PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          EXISTING=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "PR #$EXISTING already exists for branch $BRANCH"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing PR for branch $BRANCH"
          fi

      - name: Create Pull Request
        id: create_pr
        if: steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          COMMIT_MSG="${{ steps.branch.outputs.commit_msg }}"
          AHEAD="${{ steps.branch.outputs.commits_ahead }}"
          SHA="${{ steps.branch.outputs.commit_sha }}"
          AUTHOR="${{ steps.branch.outputs.author }}"

          # Create PR with auto-generated title from latest commit
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$COMMIT_MSG" \
            --body "$(cat <<EOF
          ## Auto-generated PR

          **Branch:** \`$BRANCH\`
          **Commits:** $AHEAD ahead of main
          **Latest commit:** \`$SHA\` by $AUTHOR

          ### CI Gate Status
          All checks passed:
          - [x] Build & Compile
          - [x] Security Analysis
          - [x] Performance & Reliability
          - [x] Installer Build

          ---
          *This PR was auto-created after CI Gate passed. It will be auto-merged if all PR checks pass.*
          EOF
          )")

          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR #$PR_NUMBER: $PR_URL"

      - name: Get PR number
        id: pr
        run: |
          if [ "${{ steps.check_pr.outputs.exists }}" == "true" ]; then
            echo "number=${{ steps.check_pr.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ steps.create_pr.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          echo "Merging PR #$PR_NUMBER..."

          # Retry loop — GitHub PR mergeable status ලැබෙනකන් බලා සිටිනවා
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            sleep $((i * 5))
            MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable')
            echo "Attempt $i/$MAX_RETRIES — PR mergeable status: $MERGEABLE"

            if [ "$MERGEABLE" == "MERGEABLE" ]; then
              gh pr merge "$PR_NUMBER" --squash --delete-branch \
                --subject "$(gh pr view "$PR_NUMBER" --json title --jq '.title')" \
                --body "Auto-merged after CI Gate passed. PR #$PR_NUMBER"
              echo "PR #$PR_NUMBER merged and branch deleted."
              exit 0
            elif [ "$MERGEABLE" == "CONFLICTING" ]; then
              echo "::error::PR #$PR_NUMBER has conflicts. Manual merge needed."
              exit 1
            fi
            # UNKNOWN status — GitHub තාම processing. Retry කරනවා.
          done

          echo "::error::PR #$PR_NUMBER is not mergeable after $MAX_RETRIES attempts (status: $MERGEABLE)."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate audio files
        run: |
          # main branch checkout කරනවා (PAT_TOKEN env නෑ — Python script isolate කිරීමට)
          git fetch origin main
          git checkout main
          git pull origin main

          pip install gtts
          python tools/generate_audio.py

      - name: Commit audio files to main
        run: |
          # Audio files commit කරනවා (වෙනසක් තියෙනවා නම් පමණයි)
          # git credentials checkout step PAT_TOKEN වලින් set වෙලා — GH_TOKEN env අවශ්‍ය නෑ
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/
          if git diff --staged --quiet; then
            echo "Audio files already up to date."
          else
            git commit -m "Audio files generate කිරීම (gtts)"
            git push origin main
            echo "Audio files committed to main."
          fi

      - name: Create version tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # main branch එකේ latest code fetch කරනවා (audio commit එකත් ගන්නවා)
          git fetch origin main --tags

          # Latest tag එක ගන්නවා (v1.0.0 format)
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # tag නැත්නම් v1.0.0 ඉඳන් පටන් ගන්නවා
            NEW_TAG="v1.0.0"
          else
            # Patch version එක increment කරනවා (v1.0.5 → v1.0.6)
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi

          echo "Latest tag: ${LATEST_TAG:-none}"
          echo "New tag: $NEW_TAG"

          # Tag එක හදනවා main branch එකේ latest commit එකට
          # Race condition: concurrent runs same tag create කරන්නට try කරොත් gracefully skip (#9)
          MAIN_SHA=$(git rev-parse origin/main)
          if gh api repos/${{ github.repository }}/git/refs \
              -f ref="refs/tags/$NEW_TAG" \
              -f sha="$MAIN_SHA" 2>/dev/null; then
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "Tagged $MAIN_SHA as $NEW_TAG — Release workflow triggers automatically."
          else
            echo "::warning::Tag $NEW_TAG already exists or creation failed (race condition). Skipping."
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          TAG="${{ steps.tag.outputs.tag }}"
          echo "## Auto-Merge Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`$BRANCH\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | #$PR_NUMBER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`$TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CI Gate | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Action | Auto-merge + tag + release |" >> "$GITHUB_STEP_SUMMARY"
